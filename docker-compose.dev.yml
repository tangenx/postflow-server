services:
  postflow-db:
    image: postgres:18-alpine
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postflow
      POSTGRES_DB: postflow
    volumes:
      - postflow-db-data:/var/lib/postgresql/data
      - ./init_scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postflow -d postflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postflow-db-data:
